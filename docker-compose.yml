services:
  api:
    build: .
    image: biometrical-verify:dev
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./app:/srv/app:ro
      - ./alembic:/srv/alembic:ro
      - ./models:/srv/models:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    image: biometrical-verify:dev
    env_file: .env
    depends_on:
      - redis
      - db
      - minio
    volumes:
      - ./app:/srv/app:ro
      - ./models:/srv/models:ro
      # DeepFace lazily downloads its model weights (arcface, retinaface,
      # age, gender, etc.) into ~/.deepface/weights on first use — ~250 MB
      # total. Persist that directory in a named volume so a `docker compose
      # up --force-recreate` doesn't redownload them every time.
      - deepface-weights:/home/bio/.deepface
    command: celery -A app.workers.celery_app.celery worker --loglevel=info --concurrency=2
    # Workers don't expose an HTTP port, so the Dockerfile HEALTHCHECK
    # (curl localhost:8000) always fails. Disable the inherited check.
    healthcheck:
      disable: true

  # Celery beat — runs the periodic sweepers (requeue stuck verifications,
  # purge expired nonces, hard-delete revoked KEKs). MUST run as a single
  # instance in the cluster; running multiple beats would emit duplicate
  # schedule entries.
  beat:
    build: .
    image: biometrical-verify:dev
    env_file: .env
    depends_on:
      - redis
      - db
    volumes:
      - ./app:/srv/app:ro
    command: celery -A app.workers.celery_app.celery beat --loglevel=info
    healthcheck:
      disable: true

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bio}
      POSTGRES_DB: ${POSTGRES_DB:-bio}
    volumes:
      - pg-data:/var/lib/postgresql/data
    # Bind to localhost only — the API service reaches the DB on the compose
    # network. Exposing 0.0.0.0:5432 publicly is a frequent dev-to-prod
    # mistake; the override file in docker-compose.dev.yml opens it for tools.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bio} -d ${POSTGRES_DB:-bio}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    expose:
      - "6379"

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-biominio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-biominio-secret}
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 10

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-biominio} ${S3_SECRET_KEY:-biominio-secret} &&
      mc mb -p local/${S3_BUCKET:-bio-blobs} || true &&
      mc anonymous set none local/${S3_BUCKET:-bio-blobs} &&
      exit 0
      "

volumes:
  pg-data:
  minio-data:
  deepface-weights:
